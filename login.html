<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text x=%2250%22 y=%2268%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22white%22 font-family=%22Arial%22>K</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KOMEYA 财务管理 · 登录</title>
    <style>
      :root { --bg1:#0ea5e9; --bg2:#3b82f6; --card:#ffffff; --text:#0f172a; --muted:#64748b; --blue:#2563eb; --line:#e5e7eb; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Noto Sans SC", "Microsoft Yahei", sans-serif; background: linear-gradient(135deg, var(--bg1), var(--bg2)); display:flex; align-items:center; justify-content:center; }
      .wrap { width: min(1000px, 92vw); display:grid; grid-template-columns: 1fr 1fr; gap:0; background: var(--card); border-radius: 18px; box-shadow: 0 24px 64px rgba(0,0,0,0.2); border: 1px solid var(--line); overflow:hidden; }
      .left { position:relative; padding:24px 28px; background: linear-gradient(180deg, #eff6ff, #ffffff); }
      .hero { position:absolute; inset:0; padding:24px; display:flex; align-items:center; justify-content:center; }
      .hero .circle { width:160px; height:160px; border-radius:50%; background:#dbeafe; position:absolute; left:50px; top:60px; }
      .hero .circle2 { width:120px; height:120px; border-radius:50%; background:#bfdbfe; position:absolute; right:60px; bottom:80px; }
      .hero .desk { width:70%; height:160px; background:#1e40af; border-radius:16px; opacity:0.1; }
      .right { padding:36px 40px; display:flex; flex-direction:column; }
      .brand { color: var(--blue); font-weight:700; font-size:28px; }
      .sub { color: var(--muted); margin-top:4px; }
      .form { margin-top:24px; display:flex; flex-direction:column; gap:14px; }
      .label { font-size:13px; color: var(--muted); }
      input, select { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px; outline:none; font-size:15px; background:#fff; }
      input:focus, select:focus { border-color: var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.12); }
      .password-wrap { position: relative; }
      .password-wrap input { padding-right: 52px; }
      .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#64748b; cursor:pointer; font-size:18px; line-height:1; padding:4px; user-select:none; }
      .eye-btn:hover { color:#2563eb; }
      .btn { width:100%; padding:12px 14px; border:none; border-radius:10px; background: var(--blue); color:#fff; font-weight:600; cursor:pointer; transition: transform .08s ease, filter .12s ease, opacity .12s ease; }
      .btn:hover { filter: brightness(1.03); }
      .btn:active { transform: scale(0.98); filter: brightness(0.95); }
      .btn:disabled { opacity:.72; cursor:not-allowed; }
      .tip { margin-top:10px; font-size:13px; color: var(--muted); }
      .error { margin-top:8px; padding:8px 10px; border:1px solid #fecaca; background:#fff1f2; color:#ef4444; border-radius:8px; display:none; }
      .footer { margin-top:20px; color:#93c5fd; text-align:center; font-size:12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="left">
        <div class="hero">
          <div class="desk"></div>
          <div class="circle"></div>
          <div class="circle2"></div>
        </div>
      </div>
      <div class="right">
        <div class="brand">KOMEYA 财务管理</div>
        <form id="login-form" class="form" autocomplete="off">
          <div>
            <div class="label">登录名称</div>
            <input id="login-name" type="text" placeholder="请输入登录名称" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-form-type="other" name="login_name_komeya">
          </div>
          <div>
            <div class="label">密码</div>
            <div class="password-wrap">
              <input id="login-pass" type="password" placeholder="请输入密码" autocomplete="off" data-lpignore="true" name="login_pass_komeya">
              <button id="login-eye" class="eye-btn" type="button" aria-label="按住查看密码" title="按住查看密码">👁</button>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:8px">
            <input id="login-default" type="checkbox" style="width:auto">
            <span class="label">记住密码</span>
          </div>
          <button id="login-submit" class="btn" type="submit">登录</button>
          <div id="login-error" class="error">账号或密码错误</div>
        </form>
        <div class="footer">Copyright © KOMEYA</div>
      </div>
    </div>
    <script>
      const form = document.getElementById('login-form');
      const nameInput = document.getElementById('login-name');
      const p = document.getElementById('login-pass');
      const eyeBtn = document.getElementById('login-eye');
      const err = document.getElementById('login-error');
      const def = document.getElementById('login-default');
      const submitBtn = document.getElementById('login-submit');
      const API_BASE = ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port && location.port !== '80' && location.port !== '443') ? 'http://localhost' : '';
      function setAuthUser(user) { if (user) localStorage.setItem('authUser', JSON.stringify(user)); else localStorage.removeItem('authUser'); }
      const rememberedUser = JSON.parse(localStorage.getItem('rememberedUser') || '{}');
      if (rememberedUser.name) {
        def.checked = true;
      }

      form.addEventListener('submit', async e => {
        e.preventDefault();
        const name = (nameInput.value || '').trim();
        const pass = p.value || '';
        if (!name) { err.textContent = '请输入登录名称'; err.style.display = 'block'; return; }
        let authData = null;
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = '登录中...';
        }
        try {
          const ctl = new AbortController();
          const timer = setTimeout(() => ctl.abort(), 8000);
          const r = await fetch(API_BASE + '/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, password: pass }), signal: ctl.signal });
          clearTimeout(timer);
          if (!r.ok) {
            const rem = JSON.parse(localStorage.getItem('rememberedUser')||'{}');
            if (rem.name === name) {
              localStorage.removeItem('rememberedUser');
              def.checked = false;
            }
            if (r.status === 401) {
              err.textContent = `账号或密码错误（当前账号：${name}）`;
            } else {
              err.textContent = `后端不可用或返回错误（HTTP ${r.status}），不是密码错误（当前账号：${name}）`;
            }
            err.style.display = 'block';
            return;
          }
          authData = await r.json();
          if (!authData || !authData.token || !authData.user) { err.textContent = `账号或密码错误（当前账号：${name}）`; err.style.display = 'block'; return; }
          localStorage.setItem('authToken', authData.token);
          err.style.display = 'none';
        } catch {
          err.textContent = `当前是连接测试后端超时或失败，不是密码错误（当前账号：${name}）`;
          err.style.display = 'block';
          return;
        } finally {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = '登录';
          }
        }
        
        if (def.checked && name) {
          localStorage.setItem('rememberedUser', JSON.stringify({ name, password: pass }));
        } else {
          localStorage.removeItem('rememberedUser');
        }
        
        setAuthUser({ name, role: (authData?.user?.role || '') });
        location.href = './index.html#ledger';
      });

      nameInput?.addEventListener('input', () => {
        err.style.display = 'none';
        if (!def.checked) return;
        const remembered = JSON.parse(localStorage.getItem('rememberedUser') || '{}');
        if (remembered.name && remembered.name !== nameInput.value.trim()) {
          def.checked = false;
        }
      });
      p?.addEventListener('input', () => {
        err.style.display = 'none';
      });
      const showPassword = () => {
        if (p) p.type = 'text';
      };
      const hidePassword = () => {
        if (p) p.type = 'password';
      };
      eyeBtn?.addEventListener('mousedown', showPassword);
      eyeBtn?.addEventListener('mouseup', hidePassword);
      eyeBtn?.addEventListener('mouseleave', hidePassword);
      eyeBtn?.addEventListener('touchstart', showPassword, { passive: true });
      eyeBtn?.addEventListener('touchend', hidePassword);
      eyeBtn?.addEventListener('touchcancel', hidePassword);
    </script>
  </body>
  </html>
