version: "3.8"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: komeya
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - web
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: komeya
      JWT_SECRET: change_me_in_env
    depends_on:
      - db
    networks:
      - web
  nginx:
    image: nginx:1.25
    volumes:
      - ./server/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
    networks:
      - web
volumes:
  dbdata:
networks:
  web:
    driver: bridge
